<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {box-sizing: border-box}
body {
  /* font-family: "Lato", sans-serif; */
  /* font-family: "Calibri", sans-serif; */
  font-family: "Georgia", serif; 
  background-color: #E8E0D5;
}

/* Style the tab */
.tab {
  float: left;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
  width: 10%;
  height: 80px;
}

/* Style the buttons inside the tab */
.tab button {
  display: block;
  background-color: inherit;
  color: black;
  padding: 10px 8px;
  width: 100%;
  border: none;
  outline: none;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
  font-size: 17px;
}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current "tab button" class */
.tab button.active {
  background-color: #ccc;
}

/* Style the tab content */
.tabcontent {
  float: left;
  padding: 0px 12px;
  border: 1px solid #ccc;
  width: 70%;
  border-left: none;
  height: 300px;
}
</style>
</head>
<body>

<h3>Explorations in time-series data with Scala & Spark</h3>

<div class="tab">
  <button class="tablinks" onclick="openCity(event, 'ControlsChallenge')" id="defaultOpen">London</button>
  <button class="tablinks" onclick="openCity(event, 'Paris')">Paris</button>
  <button class="tablinks" onclick="openCity(event, 'Tokyo')">Tokyo</button>
</div>

<!-- ********************************************************************** -->
<script>
document.addEventListener('keydown', function(event) {
  const tabs = document.querySelectorAll('.tablinks');
  let activeIndex = Array.from(tabs).findIndex(tab => tab === document.activeElement);

  if (event.key === 'j') {
    // Move down
    const nextIndex = (activeIndex + 1) % tabs.length;
    tabs[nextIndex].focus();
    tabs[nextIndex].click(); // Activate tab
  } else if (event.key === 'k') {
    // Move up
    const prevIndex = (activeIndex - 1 + tabs.length) % tabs.length;
    tabs[prevIndex].focus();
    tabs[prevIndex].click(); // Activate tab
  }
});
</script>


<!-- ********************************************************************** -->
<script>
function openCity(evt, cityName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(cityName).style.display = "block";
  evt.currentTarget.className += " active";
}

// Get the element with id="defaultOpen" and click on it
document.getElementById("defaultOpen").click();
</script>
   
</body>
